name: CI Build and Test

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '.github/workflows/ci-build-test.yml'
      - '02-ci-build-and-test/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-ci-build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: build docker image
        run: docker build -t cicd-prod .
      - name: run container
        run: docker run -d -p 5000:5000 --name prod-container cicd-prod
      - name: wait for app to start
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:5000; then
              echo "App is up and running."
              exit 0
            fi
            echo "Waiting for app to start..."
            sleep 2
          done
          echo "App did not start in time."
          exit 1

      - name: real test
        run: curl -f http://localhost:5000 || exit 1
      - name: cleanup container
        if: always()
        run: docker stop prod-container && docker rm prod-container        